<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS 异常事件记录平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
 --bg:#f1f5f9;--card:#ffffff;--surface:#f8fafc;--border:#e2e8f0;--divider:#f1f5f9;
 --text:#0f172a;--text-primary:#1e293b;--text-secondary:#64748b;--text-tertiary:#94a3b8;
 --primary:#1d4ed8;--primary-light:#3b82f6;--primary-bg:#eff6ff;--primary-border:#bfdbfe;
 --primary-hover:#1e40af;
 --danger:#dc2626;--danger-bg:#fef2f2;--success:#059669;--success-bg:#f0fdf4;
 --warn:#b45309;--warn-bg:#fffbeb;--info:#0e7490;--info-bg:#ecfeff;
 --purple:#7c3aed;--pink:#db2777;--teal:#0d9488;
 --shadow-sm:0 1px 2px 0 rgba(15,23,42,.04),0 1px 3px 0 rgba(15,23,42,.02);
 --shadow:0 1px 3px 0 rgba(15,23,42,.06),0 1px 2px -1px rgba(15,23,42,.04);
 --shadow-md:0 4px 8px -2px rgba(15,23,42,.07),0 2px 4px -2px rgba(15,23,42,.03);
 --shadow-lg:0 12px 20px -4px rgba(15,23,42,.1),0 4px 8px -4px rgba(15,23,42,.04);
 --shadow-xl:0 20px 32px -8px rgba(15,23,42,.12);
 --radius:16px;--radius-md:12px;--radius-sm:10px;--radius-xs:8px;--radius-pill:999px;
 --header-h:64px;--tabs-h:52px;
 --ease-out:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Inter","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.01em}

header{
 background:linear-gradient(135deg,#0f172a,#1e3a5f 40%,#1e1b4b);
 color:#fff;padding:0 32px;height:var(--header-h);display:flex;
 justify-content:space-between;align-items:center;
 box-shadow:0 4px 20px rgba(15,23,42,.25);position:sticky;top:0;z-index:50
}
header h1{font-size:18px;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;gap:12px}
header h1 .icon{
 width:36px;height:36px;background:rgba(255,255,255,.1);border-radius:var(--radius-sm);
 display:flex;align-items:center;justify-content:center;font-size:20px;
 border:1px solid rgba(255,255,255,.12);box-shadow:0 2px 8px rgba(0,0,0,.1)
}
.header-actions{display:flex;gap:10px}
.header-btn{
 padding:7px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
 color:#fff;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-weight:500;
 transition:all .2s var(--ease-out);white-space:nowrap;display:flex;align-items:center;gap:6px;
 backdrop-filter:blur(4px);letter-spacing:.2px
}
.header-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.25);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.header-btn:active{transform:translateY(0) scale(.97)}

.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid var(--border);padding:0 32px;height:var(--tabs-h);position:sticky;top:var(--header-h);z-index:49}
.tab{
 padding:0 24px;height:100%;cursor:pointer;font-size:14px;color:var(--text-secondary);
 border-bottom:3px solid transparent;display:flex;align-items:center;gap:8px;
 transition:all .25s var(--ease-out);position:relative;user-select:none;font-weight:500
}
.tab:hover{color:var(--text);background:#f8fafc}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab .badge-count{background:var(--primary-bg);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:var(--radius-pill);font-weight:600;transition:all .2s}

.container{max-width:98vw;margin:0 auto;padding:28px 32px}
.section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px;letter-spacing:-0.02em}

.card{
 background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
 border:1px solid var(--border);overflow:hidden;transition:box-shadow .3s var(--ease-out)
}
.card:hover{box-shadow:var(--shadow-md)}
.card-body{padding:24px}
.card-header{padding:18px 24px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:700;color:var(--text-primary);letter-spacing:-0.01em}

.controls-bar{
 display:flex;gap:10px;align-items:center;padding:16px 20px;
 flex-wrap:wrap;background:#fff;border-radius:var(--radius-md);
 box-shadow:var(--shadow-sm);border:1px solid var(--border);margin-bottom:20px;
 transition:box-shadow .3s var(--ease-out)
}
.controls-bar:hover{box-shadow:var(--shadow)}
.controls-bar .filter-group{display:flex;align-items:center;gap:6px}
.controls-bar label{font-size:12px;color:var(--text-secondary);white-space:nowrap;font-weight:500}
.filter-select,.filter-input{
 padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);
 font-size:13px;background:var(--surface);color:var(--text);
 transition:all .2s var(--ease-out);font-family:inherit;min-width:0
}
.filter-select:focus,.filter-input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.12);background:#fff}
.list-count{font-size:12px;color:var(--text-secondary);margin-left:auto;white-space:nowrap;font-weight:500}

.table-wrap{overflow-x:auto;border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-sm);background:#fff}
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff}
th,td{padding:12px 16px;text-align:left;font-size:13px;border-bottom:1px solid var(--divider)}
th{background:linear-gradient(180deg,#f8fafc,#f1f5f9);color:var(--text-secondary);font-weight:600;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;border-bottom:1px solid var(--border)}
th:first-child{border-top-left-radius:var(--radius-md)}
th:last-child{border-top-right-radius:var(--radius-md)}
tr:last-child td{border-bottom:none}
tr:last-child td:first-child{border-bottom-left-radius:var(--radius-md)}
tr:last-child td:last-child{border-bottom-right-radius:var(--radius-md)}
tr{transition:background .15s var(--ease-out)}
tr:hover td{background:#f1f5f9}
td a{color:var(--primary);text-decoration:none;font-weight:500;transition:opacity .15s}
td a:hover{opacity:.75}
td.cell-desc{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;gap:5px;white-space:nowrap;letter-spacing:.2px;border:1px solid transparent;transition:transform .15s var(--ease-out)}
.badge:hover{transform:scale(1.03)}
.badge-open{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}
.badge-closed{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.badge-high{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.badge-mid{background:#fef3c7;color:#92400e;border-color:#fde68a}
.badge-low{background:#dcfce7;color:#166534;border-color:#bbf7d0}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.form-grid .span-2{grid-column:span 2}
.form-grid .span-3{grid-column:span 3}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.2px}
.form-group.required label::after{content:" *";color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{
 padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius-xs);
 font-size:13px;font-family:inherit;transition:all .2s var(--ease-out);background:var(--surface);color:var(--text);box-shadow:inset 0 1px 2px rgba(15,23,42,.03)
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
 outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.1),inset 0 1px 2px transparent;background:#fff
}
.form-group textarea{resize:vertical;min-height:64px;line-height:1.5}
.form-group input[readonly]{background:#f1f5f9;color:var(--text-secondary);cursor:not-allowed;border-style:dashed}
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding:24px 0 4px}

.btn{
 display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:none;
 border-radius:var(--radius-xs);font-size:13px;cursor:pointer;font-weight:600;
 transition:all .2s var(--ease-out);white-space:nowrap;justify-content:center;line-height:1.4;
 text-decoration:none;letter-spacing:.2px;position:relative;overflow:hidden
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
.btn:hover::after{background:rgba(255,255,255,.08)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.2)}
.btn-primary:hover{box-shadow:0 4px 14px rgba(29,78,216,.3);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#059669,#047857);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.2)}
.btn-success:hover{box-shadow:0 4px 14px rgba(5,150,105,.3);transform:translateY(-1px)}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text-primary)}
.btn-outline:hover{background:var(--surface);border-color:#cbd5e1;box-shadow:var(--shadow-sm)}
.btn-danger{background:linear-gradient(135deg,var(--danger),#b91c1c);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.2)}
.btn-danger:hover{box-shadow:0 4px 14px rgba(220,38,38,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:none;padding:6px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}
.btn:disabled::after{display:none}

.pagination{display:flex;gap:8px;justify-content:center;align-items:center;padding:20px 0;font-size:13px;color:var(--text-secondary);font-weight:500}

.dialog-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .2s var(--ease-out)}
.dialog{background:#fff;border-radius:var(--radius);padding:32px;width:92%;max-width:720px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp .25s var(--ease-out);border:1px solid var(--border)}
.dialog h3{font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-0.01em}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.bi-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-bottom:28px}
.bi-stat-card{
 background:#fff;border-radius:var(--radius);padding:24px 20px;text-align:center;
 box-shadow:var(--shadow-sm);border:1px solid var(--border);position:relative;overflow:hidden;
 transition:all .3s var(--ease-out)
}
.bi-stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.bi-stat-card .stat-icon{
 width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
 margin:0 auto 12px;font-size:22px
}
.bi-stat-card .num{font-size:32px;font-weight:800;line-height:1.2;letter-spacing:-0.03em}
.bi-stat-card .lbl{font-size:12px;color:var(--text-secondary);margin-top:6px;font-weight:500}

.bi-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px;padding:12px 0}
.bi-controls label{font-size:12px;color:var(--text-secondary);font-weight:600}
.bi-controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bi-control-group{display:flex;align-items:center;gap:5px}
.bi-control-group label{font-size:11px;color:var(--text-secondary);font-weight:500;white-space:nowrap}
.bi-control-group select{font-size:11px;padding:5px 8px}

.chart-card{
 background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
 border:1px solid var(--border);margin-bottom:20px;
 transition:box-shadow .3s var(--ease-out)
}
.chart-card:hover{box-shadow:var(--shadow-md)}
.chart-card .chart-header{padding:18px 24px 0;display:flex;justify-content:space-between;align-items:center}
.chart-card .chart-header h3{font-size:13px;font-weight:600;color:var(--text-secondary);letter-spacing:.2px}
.chart-wrap{position:relative;width:100%;padding:16px 24px 24px}
.chart-wrap.aspect-3-1{aspect-ratio:3/1}
.chart-wrap.aspect-2-1{aspect-ratio:2/1}
.chart-wrap canvas{width:100% !important;height:100% !important}

#bi-custom-charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:0}
#bi-custom-charts .custom-chart-item{
 padding:20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);
 position:relative;transition:box-shadow .3s var(--ease-out)
}
#bi-custom-charts .custom-chart-item:hover{box-shadow:var(--shadow-md)}
#bi-custom-charts .custom-chart-item .chart-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
#bi-custom-charts .custom-chart-item .chart-toolbar select{flex:1;min-width:80px}
#bi-custom-charts .custom-chart-item .chart-wrap{padding:0;aspect-ratio:16/9}

.hidden{display:none !important}
.empty-state{text-align:center;padding:56px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:52px;margin-bottom:16px;opacity:.35}
.empty-state p{font-size:14px;font-weight:500}

.file-link{color:var(--primary);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.file-link:hover{opacity:.75}
.file-upload-area{
 border:2px dashed var(--border);border-radius:var(--radius-xs);padding:16px;
 text-align:center;color:var(--text-secondary);font-size:13px;cursor:pointer;
 transition:all .2s var(--ease-out);background:var(--surface)
}
.file-upload-area:hover{border-color:var(--primary-light);background:var(--primary-bg);color:var(--primary)}
.file-upload-area input[type="file"]{display:none}

@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

@media(max-width:1024px){
 .bi-summary{grid-template-columns:repeat(2,1fr)}
 #bi-custom-charts{grid-template-columns:1fr}
}
@media(max-width:768px){
 .container{padding:16px}
 .form-grid{grid-template-columns:1fr}
 .form-grid .span-2,.form-grid .span-3{grid-column:span 1}
 .controls-bar .filter-group{flex:1 1 calc(50% - 8px)}
 .chart-wrap.aspect-3-1{aspect-ratio:16/9}
 .chart-wrap.aspect-2-1{aspect-ratio:16/9}
 .bi-summary{grid-template-columns:repeat(2,1fr);gap:12px}
 #bi-custom-charts{grid-template-columns:1fr}
 header{padding:0 16px}
 .tabs{padding:0 16px}
 .header-actions{gap:6px}
 .header-btn{padding:6px 10px;font-size:11px}
 .dialog{padding:24px;width:95%;border-radius:var(--radius-md)}
}
</style>
</head>
<body>

<header>
 <div style="display:flex;align-items:center;gap:10px">
 <a href="/" style="color:var(--text-muted);text-decoration:none;opacity:0.5;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5" title="返回首页"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
 <h1><span class="icon">⚡</span> EHS 异常事件记录平台</h1>
 </div>
 <div class="header-actions" id="header-user" style="display:flex;align-items:center;gap:12px;margin-left:auto">
 <button class="header-btn" onclick="document.getElementById('import-file').click()" id="btn-import">导入Excel</button>
 <button class="header-btn" onclick="exportExcel()" id="btn-export">导出Excel</button>
 <input type="file" id="import-file" accept=".xlsx" onchange="importExcel(this)" style="display:none">
 <button class="header-btn" onclick="downloadTemplate()" id="btn-template">下载模板</button>
 <button class="header-btn" onclick="openOptionsManager()" id="btn-options-manager">选项管理</button>
 <span id="user-name" style="font-size:13px;font-weight:500;opacity:.9"></span>
 <button class="header-btn" onclick="logout()" title="退出登录">退出</button>
 </div>
</header>

<!-- 登录视图 -->
<div id="view-login" class="hidden" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a5f 40%,#1e1b4b)">
 <div style="background:#fff;border-radius:var(--radius);padding:40px;width:92%;max-width:400px;box-shadow:var(--shadow-xl);border:1px solid var(--border)">
 <div style="text-align:center;margin-bottom:28px">
 <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--primary-hover));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#fff">⚡</div>
 <h2 style="font-size:20px;font-weight:700;color:var(--text)">异常事件记录平台</h2>
 <p style="font-size:13px;color:var(--text-secondary);margin-top:6px">请登录以继续使用</p>
 </div>
 <div class="form-group" style="margin-bottom:16px">
 <label>用户名</label>
 <input type="text" id="login-username" placeholder="请输入用户名" onkeyup="if(event.key==='Enter')document.getElementById('login-password').focus()">
 </div>
 <div class="form-group" style="margin-bottom:24px">
 <label>密码</label>
 <input type="password" id="login-password" placeholder="请输入密码" onkeyup="if(event.key==='Enter')doLogin()">
 </div>
 <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
 <p id="login-error" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none"></p>
 </div>
</div>

<!-- 主应用 -->
<div id="app-main">

<div class="tabs">
 <div class="tab active" onclick="switchTab('list')">事件清单 <span class="badge-count" id="tab-count">0</span></div>
 <div class="tab" onclick="switchTab('form')">新增事件</div>
 <div class="tab" onclick="switchTab('bi')">BI分析</div>
</div>

<div class="container">

 <!-- 事件清单 -->
 <div id="view-list">
 <div class="controls-bar">
 <div class="filter-group">
 <label>状态</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-status">
 <option value="">全部</option><option value="待复盘">待复盘</option><option value="已复盘">已复盘</option><option value="措施已落实">措施已落实</option>
 </select>
 </div>
 <div class="filter-group">
 <label>异常类型</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-incident-type"><option value="">全部</option></select>
 </div>
 <div class="filter-group">
 <label>事件等级</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-event-level"><option value="">全部</option></select>
 </div>
 <div class="filter-group">
 <label>实验室</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-lab"><option value="">全部</option></select>
 </div>
 <div class="filter-group">
 <label>版本</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-version"><option value="">全部</option></select>
 </div>
 <div class="filter-group">
 <label>子系统</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-subsystem"><option value="">全部</option></select>
 </div>
 <div class="filter-group" style="flex:1;min-width:200px">
 <input class="filter-input" type="text" id="filter-search" placeholder="搜索单号、描述、设备名称…" style="width:100%" onkeyup="debounceSearch()">
 </div>
 <div class="filter-group">
 <label>排序</label>
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-sort-by">
 <option value="report_date">提交时间</option>
 <option value="review_date">复盘时间</option>
 </select>
 </div>
 <div class="filter-group">
 <select class="filter-select" onchange="currentPage=1;loadList()" id="filter-sort-order" title="排序方向">
 <option value="desc">降序 ↓</option>
 <option value="asc">升序 ↑</option>
 </select>
 </div>
 <button class="btn btn-primary btn-sm" onclick="switchTab('form')">＋ 新增事件</button>
 <span class="list-count" id="list-count">加载中…</span>
 </div>

 <div class="table-wrap">
 <table id="incident-table">
 <thead>
 <tr>
 <th>单号</th><th>异常类型</th><th>事件等级</th><th>实验室</th><th>版本</th><th>子系统</th><th>设备名称</th>

<script>
const API = '/api/incident';
let currentPage = 1;
let currentUser = null;
let userRole = '';
let reportFileToUpload = null;

// API 请求封装
async function apiFetch(url, opts) {
 opts = opts || {};
 opts.headers = opts.headers || {};
 const token = localStorage.getItem('token');
 if (token) {
 opts.headers['Authorization'] = 'Bearer ' + token;
 }
 const r = await fetch(url, opts);
 if (r.status === 401) {
 // 不立即弹登录，只抛错。只有 init() 调 /auth/me 才决定是否清 token
 throw new Error('请求失败（401），请重试');
 }
 return r;
}

// 登录 / 注销
function showLoginView() {
 document.getElementById('view-login').classList.remove('hidden');
 document.getElementById('view-login').style.display = 'flex';
 document.getElementById('app-main').style.display = 'none';
 document.getElementById('header-user').style.display = 'none';
}

function showAppView() {
 document.getElementById('view-login').classList.add('hidden');
 document.getElementById('view-login').style.display = 'none';
 document.getElementById('app-main').style.display = '';
 document.getElementById('header-user').style.display = 'flex';
 updateHeaderVisibility();
}

function updateHeaderVisibility() {
 const adminBtns = ['btn-import','btn-export','btn-template','btn-options-manager'];
 adminBtns.forEach(id => {
 const el = document.getElementById(id);
 if (el) el.style.display = userRole === 'admin' ? '' : 'none';
 });
}

async function doLogin() {
 const username = document.getElementById('login-username').value.trim();
 const password = document.getElementById('login-password').value;
 const errEl = document.getElementById('login-error');
 errEl.style.display = 'none';
 if (!username || !password) {
 errEl.textContent = '请输入用户名和密码';
 errEl.style.display = 'block';
 return;
 }
 try {
 const r = await fetch('/api/hazard/auth/login', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({username, password})
 });
 const d = await r.json();
 if (!r.ok || d.error) {
 errEl.textContent = d.error || '登录失败';
 errEl.style.display = 'block';
 return;
 }
 localStorage.setItem('token', d.token);
 currentUser = d.user;
 userRole = d.user.role;
 document.getElementById('user-name').textContent = (d.user.display_name || d.user.username) + ' (' + (userRole === 'admin' ? '管理员' : '用户') + ')';
 document.getElementById('login-username').value = '';
 document.getElementById('login-password').value = '';
 showAppView();
 await initApp();
 } catch (e) {
 errEl.textContent = '登录失败：' + e.message;
 errEl.style.display = 'block';
 }
}

function logout() {
 if (!confirm('确认退出登录？')) return;
 localStorage.removeItem('token');
 currentUser = null;
 userRole = '';
 showLoginView();
}

// 初始化
async function init() {
 const token = localStorage.getItem('token');
 if (!token) {
 showLoginView();
 return;
 }
 try {
 const r = await fetch('/api/hazard/auth/me', {
 headers: {'Authorization': 'Bearer ' + token}
 });
 if (r.status === 401) {
 localStorage.removeItem('token');
 showLoginView();
 return;
 }
 const d = await r.json();
 currentUser = d;
 userRole = d.role || '';
 document.getElementById('user-name').textContent = (d.display_name || d.username) + ' (' + (userRole === 'admin' ? '管理员' : '用户') + ')';
 showAppView();
 await initApp();
 } catch (e) {
 localStorage.removeItem('token');
 showLoginView();
 }
}

async function initApp() {
 document.getElementById('f-report-date').value = new Date().toISOString().split('T')[0];
 await loadFilterOptions();
 await loadList();
}

async function loadFilterOptions() {
 try {
 // 从选项管理接口获取各字段的选项值
 const r = await apiFetch(`${API}/options/fields`);
 const allOptions = await r.json();
 const fields = ['incident_type', 'event_level', 'lab', 'version', 'subsystem'];
 for (const field of fields) {
 const sel = document.getElementById('filter-' + field.replace(/_/g, '-'));
 if (!sel) continue;
 const currentVal = sel.value;
 const prefix = field === 'incident_type' ? '全部类型' :
 field === 'event_level' ? '全部等级' :
 field === 'lab' ? '全部实验室' :
 field === 'version' ? '全部版本' :
 field === 'subsystem' ? '全部子系统' : '全部';
 sel.innerHTML = `<option value="">${prefix}</option>`;
 (allOptions[field] || []).forEach(v => {
 const o = document.createElement('option'); o.value = v; o.textContent = v;
 sel.appendChild(o);
 });
 sel.value = currentVal;
 }
 // 填充表单中的 select 选项
 const formFields = ['incident_type', 'event_level', 'lab', 'version', 'subsystem', 'device_name'];
 const formMaps = { incident_type: 'f-incident-type', event_level: 'f-event-level', lab: 'f-lab', version: 'f-version', subsystem: 'f-subsystem', device_name: 'f-device-name' };
 for (const field of formFields) {
 const el = document.getElementById(formMaps[field]);
 if (!el || el.tagName !== 'SELECT') continue;
 const currentVal = el.value;
 el.innerHTML = '<option value=""></option>' +
 (allOptions[field] || []).map(v => `<option value="${v}">${v}</option>`).join('') +
 '<option value="__other__" style="color:var(--primary);font-style:italic"> 其他（手动填写）</option>';
 el.value = currentVal;
 // 同步 other input 显隐
 const other = document.getElementById(formMaps[field] + '-other');
 if (other) {
 other.classList.add('hidden');
 other.value = '';
 }
 }
 } catch (e) {
 console.error('加载筛选选项失败', e);
 }
}

// 选项管理
function openOptionsManager() {
 document.getElementById('options-dialog').classList.remove('hidden');
 renderOptionsList();
}
function closeOptionsManager() {
 document.getElementById('options-dialog').classList.add('hidden');
}

async function renderOptionsList() {
 const of = document.getElementById('opt-field');
 const labels = {
 incident_type:'异常类型', event_level:'事件等级', lab:'实验室',
 version:'版本', subsystem:'子系统', device_name:'设备名称'
 };
 // 初始化字段选择器（只执行一次）
 if (!of.dataset.inited) {
 of.innerHTML = Object.keys(labels).map(k => `<option value="${k}">${labels[k]}</option>`).join('');
 of.dataset.inited = '1';
 of.onchange = () => renderOptionsList();
 }
 const fn = of.value;
 try {
 const r = await apiFetch(`${API}/options?field=${fn}`);
 const opts = await r.json();
 const container = document.getElementById('opt-list');
 container.innerHTML = `<div class="opt-section"><h4>${labels[fn] || fn}</h4><div class="opt-tags">${opts.length ?
 opts.map(o => `<span class="opt-tag">${o.value}<span class="del" onclick="delOption(${o.id})">✕</span></span>`).join('') :
 '<span style="font-size:13px;color:var(--text-secondary)">暂无选项</span>'}</div></div>`;
 } catch (e) {
 console.error('加载选项失败', e);
 }
}

async function addOption() {
 const fn = document.getElementById('opt-field').value;
 const v = document.getElementById('opt-new-value').value.trim();
 if (!fn || !v) return;
 const r = await apiFetch(API + '/options', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({field_name: fn, value: v})
 });
 if (!r.ok) { showToast('添加失败', true); return; }
 document.getElementById('opt-new-value').value = '';
 await renderOptionsList();
 await loadFilterOptions();
}

async function delOption(id) {
 const r = await apiFetch(API + '/options/' + id, {method: 'DELETE'});
 if (!r.ok) { showToast('删除失败', true); return; }
 await renderOptionsList();
 await loadFilterOptions();
}

// Toast 通知
function showToast(msg, isError) {
 const t = document.createElement('div');
 t.textContent = msg;
 Object.assign(t.style, {
 position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
 padding:'12px 24px', borderRadius:'8px', background: isError ? '#dc2626' : '#16a34a',
 color:'#fff', fontSize:'14px', fontWeight:'600', zIndex:'999',
 boxShadow:'0 4px 12px rgba(0,0,0,.2)', transition:'opacity .3s, transform .3s', opacity:'0'
 });
 document.body.appendChild(t);
 requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(-4px)'; });
 setTimeout(() => {
 t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)';
 setTimeout(() => t.remove(), 300);
 }, 3000);
}

function otherChanged(sel) {
 const otherInput = document.getElementById(sel.id + '-other');
 if (sel.value === '__other__') {
 otherInput.classList.remove('hidden');
 otherInput.focus();
 sel.value = '';
 } else {
 if (otherInput) otherInput.classList.add('hidden');
 }
}

function getFieldValue(fieldName) {
 const sel = document.getElementById('f-' + fieldName.replace(/_/g, '-'));
 const other = document.getElementById('f-' + fieldName.replace(/_/g, '-') + '-other');
 if (sel && other && !other.classList.contains('hidden')) return other.value;
 return sel ? sel.value : '';
}

// 清单
async function loadList() {
 const params = new URLSearchParams({page: currentPage, size: 30});
 ['status','incident_type','event_level','lab','version','subsystem'].forEach(k => {
 const v = document.getElementById('filter-' + k.replace(/_/g, '-')).value;
 if (v) params.set(k, v);
 });
 const search = document.getElementById('filter-search').value.trim();
 if (search) params.set('search', search);
 const sortBy = document.getElementById('filter-sort-by').value;
 const sortOrder = document.getElementById('filter-sort-order').value;
 if (sortBy) {
 params.set('sort_by', sortBy);
 params.set('sort_order', sortOrder);
 }

 const r = await apiFetch(`${API}/incidents?${params}`);
 const d = await r.json();
 document.getElementById('list-count').textContent = `共 ${d.total} 条`;
 document.getElementById('tab-count').textContent = d.total;
 const tbody = document.getElementById('incident-tbody');
 const isAdmin = userRole === 'admin';
 if (!d.items.length) {
 tbody.innerHTML = '<tr><td colspan="13"><div class="empty-state"><div ></div><p>暂无异常事件记录</p></div></td></tr>';
 } else {
 tbody.innerHTML = d.items.map(h => {
 const reportLink = h.review_report_path
 ? `<a href="#" class="file-link" onclick="downloadReport(${h.id});return false;" title="下载复盘报告">📎 已上传</a>`
 : '<span style="color:var(--text-tertiary)">-</span>';
 return `<tr class="${h.status==='措施已落实'?'row-closed':''}">
 <td>${isAdmin ? `<a href="#" onclick="editIncident(${h.id})">${h.incident_no}</a>` : h.incident_no}</td>
 <td>${h.incident_type||'-'}</td>
 <td><span class="badge badge-${h.event_level==='High'?'high':h.event_level==='Medium'?'mid':'low'}">${h.event_level||'-'}</span></td>
 <td>${h.lab||'-'}</td><td>${h.version||'-'}</td><td>${h.subsystem||'-'}</td><td>${h.device_name||'-'}</td>
 <td class="cell-desc" title="${h.description||''}">${h.description||'-'}</td>
 <td>${h.reporter||'-'}</td><td>${h.report_date||'-'}</td>
 <td><span class="badge badge-${h.status==='待复盘'?'open':h.status==='已复盘'?'hang':'closed'}">${h.status}</span></td>
 <td>${reportLink}</td>
 <td>${h.reviewer||'-'}</td>
 <td style="white-space:nowrap;text-align:center">
 ${isAdmin ? `<div style="display:inline-flex;gap:6px;align-items:center">
 <button class="btn btn-xs btn-outline" onclick="editIncident(${h.id})" title="编辑">编辑</button>
 <button class="btn btn-xs btn-ghost" onclick="uploadReport(${h.id})" title="上传复盘报告">📎</button>
 ${h.status !== '措施已落实' ? `<button class="btn btn-xs btn-success" onclick="markImplemented(${h.id})" title="标记为措施已落实">落实</button>` : ''}
 <button class="btn btn-xs btn-ghost" onclick="delIncident(${h.id})" style="color:var(--danger)" title="删除">删除</button></div>` : '<span style="color:var(--text-tertiary)">-</span>'}
 </td>
 </tr>`;
 }).join('');
 }

 const pg = document.getElementById('pagination');
 const totalPages = Math.ceil(d.total / 30);
 pg.innerHTML = '';
 if (currentPage > 1) {
 pg.innerHTML += `<button class="btn btn-sm btn-outline" onclick="currentPage--;loadList()">◀ 上一页</button>`;
 }
 pg.innerHTML += `<span>第 ${currentPage} / ${Math.max(1,totalPages)} 页</span>`;
 if (currentPage < totalPages) {
 pg.innerHTML += `<button class="btn btn-sm btn-outline" onclick="currentPage++;loadList()">下一页 ▶</button>`;
 }
}

// Tab 切换
function switchTab(tab) {
 document.querySelectorAll('.tab').forEach((t, i) => {
 const tabs = ['list','form','bi'];
 t.classList.toggle('active', tabs[i] === tab);
 });
 ['view-list','view-form','view-bi'].forEach(id => {
 document.getElementById(id).classList.toggle('hidden', !id.includes(tab));
 });
 if (tab === 'bi') biInit();
 else if (tab === 'list') loadList();
 else if (tab === 'form') {
 document.getElementById('edit-id').value = '';
 document.getElementById('f-incident-no').value = '';
 document.getElementById('form-title').textContent = '新增异常事件';
 ['f-incident-type','f-event-level','f-lab','f-version','f-subsystem','f-device-name','f-description','f-reporter','f-review-date'].forEach(id => {
 const el = document.getElementById(id);
 if (el) el.value = '';
 const o = document.getElementById(id+'-other');
 if(o) { o.value = ''; o.classList.add('hidden'); }
 });
 document.getElementById('f-report-date').value = new Date().toISOString().split('T')[0];
 document.getElementById('f-status').value = '待复盘';
 reportFileToUpload = null;
 document.getElementById('f-report-file').value = '';
 document.getElementById('report-file-name').textContent = '点击上传复盘报告（PDF/Word等）';
 document.getElementById('report-current').innerHTML = '';
 }
}

// 文件上传相关
function onReportFileChange(input) {
 const file = input.files[0];
 if (file) {
 reportFileToUpload = file;
 document.getElementById('report-file-name').textContent = file.name;
 }
}

async function uploadReport(id) {
 const input = document.createElement('input');
 input.type = 'file';
 input.onchange = async function() {
 const file = this.files[0];
 if (!file) return;
 const fd = new FormData();
 fd.append('file', file);
 try {
 const r = await apiFetch(`${API}/incidents/${id}/upload`, {method: 'POST', body: fd});
 if (!r.ok) { showToast('上传失败', true); return; }
 showToast('复盘报告上传成功');
 loadList();
 } catch (e) { showToast('上传失败：' + e.message, true); }
 };
 input.click();
}

async function downloadReport(id) {
 try {
 const r = await apiFetch(`${API}/incidents/${id}/download`);
 if (!r.ok) { showToast('下载失败', true); return; }
 const blob = await r.blob();
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 // 从 Content-Disposition 或 fallback 文件名
 const disp = r.headers.get('content-disposition');
 let fname = '复盘报告';
 if (disp) {
 const m = disp.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
 if (m) fname = m[1].replace(/['"]/g, '');
 }
 a.download = fname;
 document.body.appendChild(a); a.click(); a.remove();
 URL.revokeObjectURL(url);
 } catch (e) { showToast('下载失败：' + e.message, true); }
}

// 表单
async function editIncident(id) {
 const r = await apiFetch(API + '/incidents/' + id);
 const h = await r.json();
 switchTab('form');
 document.getElementById('edit-id').value = h.id;
 document.getElementById('f-incident-no').value = h.incident_no;
 document.getElementById('form-title').innerHTML = '编辑异常事件 #' + h.incident_no;

 // 先加载选项，确保 select 有内容
 await loadFilterOptions();

 // 设置各字段值（处理"其他"情况）
 const setField = (fn, val) => {
 const sel = document.getElementById('f-' + fn.replace(/_/g, '-'));
 const other = document.getElementById('f-' + fn.replace(/_/g, '-') + '-other');
 if (!sel) return;
 // 检查值是否在选项中
 const opts = Array.from(sel.options).map(o => o.value).filter(v => v && v !== '__other__');
 if (val && opts.includes(val)) {
 sel.value = val;
 if (other) other.classList.add('hidden');
 } else if (val && other) {
 sel.value = '__other__';
 other.value = val;
 other.classList.remove('hidden');
 } else {
 sel.value = '';
 if (other) { other.value = ''; other.classList.add('hidden'); }
 }
 };

 ['incident_type','event_level','lab','version','subsystem','device_name'].forEach(fn => {
 setField(fn, h[fn] || '');
 });

 ['description','status','reporter','report_date','review_date'].forEach(fn => {
 const el = document.getElementById('f-' + fn.replace(/_/g, '-'));
 if (el) el.value = h[fn] || '';
 });

 reportFileToUpload = null;
 document.getElementById('f-report-file').value = '';
 if (h.review_report_path) {
 document.getElementById('report-file-name').textContent = '点击更换复盘报告';
 document.getElementById('report-current').innerHTML = `当前报告：<a href="#" class="file-link" onclick="downloadReport(${h.id});return false;">${h.review_report_path}</a>`;
 } else {
 document.getElementById('report-file-name').textContent = '点击上传复盘报告（PDF/Word等）';
 document.getElementById('report-current').innerHTML = '';
 }
}

async function submitForm(e) {
 e.preventDefault();
 const editId = document.getElementById('edit-id').value;
 const data = {
 incident_no: document.getElementById('f-incident-no').value || '',
 incident_type: getFieldValue('incident_type'),
 event_level: getFieldValue('event_level'),
 lab: getFieldValue('lab'),
 version: getFieldValue('version'),
 subsystem: getFieldValue('subsystem'),
 device_name: getFieldValue('device_name'),
 description: document.getElementById('f-description').value,
 status: document.getElementById('f-status').value,
 reporter: document.getElementById('f-reporter').value,
 report_date: document.getElementById('f-report-date').value,
 review_date: document.getElementById('f-review-date').value,
 };

 const url = editId ? API + '/incidents/' + editId : API + '/incidents';
 const method = editId ? 'PUT' : 'POST';
 const r = await apiFetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
 if (!r.ok) { showToast('保存失败：' + ((await r.json()).error || '未知错误'), true); return; }

 // 如果有文件要上传
 if (reportFileToUpload) {
 const saved = await r.json();
 const incidentId = editId || saved.id;
 const fd = new FormData();
 fd.append('file', reportFileToUpload);
 const ur = await apiFetch(`${API}/incidents/${incidentId}/upload`, {method: 'POST', body: fd});
 if (!ur.ok) { showToast('事件已保存，但报告上传失败', true); }
 }

 showToast('保存成功');
 switchTab('list');
}

async function biInit() {
 const s = await (await apiFetch(`${API}/stats/summary`)).json();
 const openCount = s.by_status?.open||0;
 const closedCount = s.by_status?.closed||0;
 const total = s.total||0;
 const closeRate = total > 0 ? Math.round(closedCount / total * 100) : 0;
 document.getElementById('bi-summary').innerHTML = [
 {label:'事件总数',value:total,color:'#3b82f6'},
 {label:'待处理',value:openCount,color:'#f59e0b'},
 {label:'已闭环',value:closedCount,color:'#10b981'},
 {label:'已复盘',value:s.with_report||0,color:'#8b5cf6'},
 {label:'闭环率',value:closeRate + '%',color:'#06b6d4'}
 ].map(c => `
 <div class="bi-stat-card">
 <div class="num" style="color:${c.color}">${c.value}</div>
 <div class="lbl">${c.label}</div>
 </div>`).join('');

 biRefresh();
 biCross();
 biTrend();
 biLabTrend();
}

async function biRefresh() {
 let type = document.getElementById('bi-chart-type').value;
 const xField = document.getElementById('bi-x-field').value;
 const sort = document.getElementById('bi-sort').value;
 const limit = parseInt(document.getElementById('bi-limit').value);
 const colors = getColors();

 const r = await apiFetch(`${API}/stats/aggregate?group_by=${xField}`);
 const d = await r.json();

 let labels = [...d.labels];
 let values = [...d.values];
 const combined = labels.map((l, i) => ({ label: l, value: values[i] }));
 if (sort === 'asc') {
 combined.sort((a, b) => a.value - b.value);
 } else if (sort === 'desc') {
 combined.sort((a, b) => b.value - a.value);
 } else {
 combined.sort((a, b) => String(a.label).localeCompare(String(b.label), 'zh-CN'));
 }

 let displayData = combined;
 if (limit > 0 && combined.length > limit) {
 const top = combined.slice(0, limit);
 const otherSum = combined.slice(limit).reduce((s, item) => s + item.value, 0);
 if (otherSum > 0) top.push({ label: '其他', value: otherSum });
 displayData = top;
 }

 labels = displayData.map(x => x.label);
 values = displayData.map(x => x.value);

 const ctx = document.getElementById('bi-main-chart').getContext('2d');
 if (mainChart) mainChart.destroy();

 const isPieLike = type === 'pie' || type === 'doughnut' || type === 'polarArea';
 const isRadar = type === 'radar';
 const isHorizontal = type === 'bar-h';
 const isArea = type === 'area';
 const chartType = isHorizontal ? 'bar' : (isArea ? 'line' : type);

 const dataset = {
 label: xField,
 data: values,
 backgroundColor: isPieLike || isRadar ? colors : colors[0] + 'cc',
 borderColor: isPieLike || isRadar ? colors : colors[0],
 borderWidth: isPieLike ? 2 : 2,
 borderRadius: isPieLike || isRadar ? 0 : 6,
 maxBarThickness: 60,
 fill: isArea,
 tension: (type === 'line' || isArea) ? 0.3 : 0,
 pointBackgroundColor: colors[0],
 pointBorderColor: '#fff',
 pointBorderWidth: 2,
 pointRadius: (type === 'line' || isArea) ? 4 : 0,
 pointHoverRadius: 6,
 };

 if (chartType === 'bar' && !isHorizontal) {
 dataset.backgroundColor = labels.map((_, i) => colors[i % colors.length] + 'cc');
 dataset.borderColor = labels.map((_, i) => colors[i % colors.length]);
 }
 if (isHorizontal) {
 dataset.backgroundColor = labels.map((_, i) => colors[i % colors.length] + 'cc');
 dataset.borderColor = labels.map((_, i) => colors[i % colors.length]);
 }

 const scales = {};
 if (chartType === 'bar' || chartType === 'line') {
 const xAxis = {
 ticks: { font: { size: 11 }, maxRotation: 45, minRotation: 0 },
 grid: { display: false }
 };
 const yAxis = {
 beginAtZero: true,
 ticks: { stepSize: 1, font: { size: 11 } },
 grid: { color: '#f1f5f9' }
 };
 if (isHorizontal) {
 scales.x = yAxis;
 scales.y = xAxis;
 } else {
 scales.x = xAxis;
 scales.y = yAxis;
 }
 }
 if (isRadar) {
 scales.r = {
 beginAtZero: true,
 ticks: { stepSize: 1, font: { size: 10 } },
 grid: { color: '#e2e8f0' },
 pointLabels: { font: { size: 11 } }
 };
 }

 mainChart = new Chart(ctx, {
 type: chartType,
 data: {
 labels: labels,
 datasets: [dataset]
 },
 options: {
 responsive: true,
 maintainAspectRatio: false,
 indexAxis: isHorizontal ? 'y' : 'x',
 plugins: {
 legend: { display: isPieLike || isRadar, position: isRadar ? 'top' : 'right', labels: { boxWidth: 14, padding: 12, font: { size: 11 } } },
 tooltip: {
 backgroundColor: 'rgba(15,23,42,.85)',
 cornerRadius: 8,
 padding: 12,
 titleFont: { size: 13, weight: 'bold' },
 bodyFont: { size: 12 }
 }
 },
 scales: scales
 }
 });
}

 const yField = document.getElementById('cross-y-field').value;

 });
}

// Excel 导入导出
async function exportExcel() {
 try {
 const r = await apiFetch(API + '/excel/export/excel');
 if (!r.ok) { showToast('导出失败', true); return; }
 const blob = await r.blob();
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 const disp = r.headers.get('content-disposition');
 let fname = 'EHS异常事件数据.xlsx';
 if (disp) {
 const m = disp.match(/filename\*?=utf-8''(.+)/);
 if (m) fname = decodeURIComponent(m[1]);
 }
 a.download = fname;
 document.body.appendChild(a); a.click(); a.remove();
 URL.revokeObjectURL(url);
 } catch (e) { showToast('导出失败：' + e.message, true); }
}

 try {
 const r = await apiFetch(API + '/excel/export/template');
 if (!r.ok) { showToast('下载失败', true); return; }
 const blob = await r.blob();
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url; a.download = 'EHS异常事件导入模板.xlsx';

async function importExcel(input) {
 const file = input.files[0];
 if (!file) return;
 const btn = document.getElementById('btn-import');
 const orig = btn ? btn.textContent : '导入Excel';
 if (btn) { btn.textContent = '⏳ 导入中…'; btn.disabled = true; }
 try {
 const fd = new FormData(); fd.append('file', file); fd.append('extract_options', 'true');
 const r = await apiFetch(API + '/excel/import/excel', {method: 'POST', body: fd});
 const d = await r.json();
 if (d.ok) {
 showToast('导入完成：' + d.imported + ' 条记录，新增 ' + d.options_added + ' 个选项');
 await loadFilterOptions(); await loadList();
 } else {
 showToast('导入失败：' + (d.error || '未知错误'), true);
 }
 } catch(e) {
 showToast('导入失败：' + e.message, true);
 }
 if (btn) { btn.textContent = orig; btn.disabled = false; }
 input.value = '';
}
